<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EliteEarn | Best Earning Concept</title>
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #10b981;
            --danger: #ef4444;
            --dark: #1e293b;
            --light: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding-bottom: 60px;
        }

        nav {
            background: var(--dark);
            color: white;
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .container {
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        .balance-card {
            background: linear-gradient(135deg, var(--primary), #1d4ed8);
            color: white;
            text-align: center;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: var(--secondary); color: white; }
        .btn-danger { background: var(--danger); color: white; }

        input {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 10px;
        }

        .admin-section {
            border-top: 4px solid var(--danger);
            display: none; /* Hidden by default */
        }

        .request-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #eee;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 15px;
        }

        .stat-box {
            background: #f1f5f9;
            padding: 15px;

            border-radius: 8px;
            text-align: center;
        }

        footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: var(--dark);
            color: white;
            text-align: center;
            padding: 10px 0;
            font-size: 0.9rem;
        }

        .banned-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            color: white;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
    </style>
</head>
<body>

<div id="bannedScreen" class="banned-overlay">
    <h1>ACCOUNT BANNED</h1>
    <p>You have violated our terms of service.</p>
</div>

<nav>
    <div style="font-size: 1.5rem; font-weight: bold;">EliteEarn</div>
    <div>
        <button onclick="switchView('user')" class="btn-primary">User View</button>
        <button onclick="switchView('admin')" class="btn-danger">Admin Panel</button>
    </div>
</nav>

<div class="container">
    <!-- USER SECTION -->
    <div id="userView">
        <div class="card balance-card">
            <p>Available Balance</p>
            <h1 id="userBalance">$0.00</h1>
            <button class="btn-success" onclick="requestWithdrawal()">Withdraw Funds</button>
        </div>

        <div class="card">
            <h3>Referral Program (12% Bonus)</h3>
            <p>Your Referral Code: <strong id="myReferralCode">...</strong></p>
            <input type="text" id="referralInput" placeholder="Enter 6-char referral code">
            <button class="btn-primary" style="width: 100%" onclick="applyReferral()">Claim Bonus</button>
            
            <div class="stats-grid">
                <div class="stat-box">
                    <small>Total Referrals</small>
                    <h3 id="totalReferrals">0</h3>
                </div>
                <div class="stat-box">
                    <small>Total Earned</small>
                    <h3 id="totalReferralEarnings">$0.00</h3>
                </div>
            </div>
        </div>
    </div>

    <!-- ADMIN SECTION -->
    <div id="adminView" class="admin-section">
        <h2>Admin Dashboard</h2>
        
        <div class="card">
            <h3>Pending Withdrawals</h3>
            <div id="withdrawalRequests">
                <!-- Injected by JS -->
            </div>
        </div>

        <div class="card">
            <h3>User Management</h3>
            <div id="userList">
                <!-- Injected by JS -->
            </div>
        </div>
    </div>
</div>

<footer>
    <span id="footerDateTime"></span>
</footer>

<script src="app.js"></script>
</body>
</html>
